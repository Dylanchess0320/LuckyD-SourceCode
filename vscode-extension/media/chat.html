<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuckyD Code</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #161b22;
    --surface-2: #1c2333;
    --border: #2a3344;
    --text: #e6edf3;
    --text-muted: #8b9cb3;
    --accent: #00d4ff;
    --accent-dim: rgba(0, 212, 255, 0.12);
    --accent-hover: #33ddff;
    --user-bg: #1a2744;
    --agent-bg: #161b22;
    --danger: #f87171;
    --success: #34d399;
    --warn: #fbbf24;
    --tool-bg: #121820;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  #brand-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #00d4ff 0%, #7c5cfc 100%);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 13px;
    color: #0a0e14;
    flex-shrink: 0;
  }
  #brand-text {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #brand-title {
    font-size: 13px;
    font-weight: 650;
    letter-spacing: 0.2px;
  }
  #brand-sub {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #header-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
  }
  .icon-btn:hover {
    color: var(--text);
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  /* Chat */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 8px;
    scroll-behavior: smooth;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #chat::-webkit-scrollbar { width: 8px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 8px;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    max-width: 320px;
    padding: 24px 12px 40px;
    color: var(--text-muted);
  }
  .empty-state h2 {
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .empty-state p {
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .chip {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .chip:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .message {
    max-width: min(92%, 720px);
    padding: 10px 12px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 13.5px;
    word-wrap: break-word;
    border: 1px solid transparent;
  }
  .message.user {
    align-self: flex-end;
    background: var(--user-bg);
    border-color: #243556;
  }
  .message.agent {
    align-self: flex-start;
    background: var(--agent-bg);
    border-color: var(--border);
  }
  .message.system {
    align-self: center;
    color: var(--text-muted);
    font-size: 12px;
    background: transparent;
    padding: 4px 8px;
  }
  .message.tool-result {
    align-self: flex-start;
    background: var(--tool-bg);
    border-color: var(--border);
    font-family: Consolas, "Courier New", monospace;
    font-size: 12px;
    white-space: pre-wrap;
    max-width: min(92%, 720px);
  }
  .message.error {
    align-self: stretch;
    border-color: rgba(248, 113, 113, 0.45);
    background: rgba(248, 113, 113, 0.08);
    color: #fecaca;
  }
  .msg-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .msg-label .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
  }
  .msg-label .dot.user { background: #60a5fa; }
  .msg-label .dot.agent { background: var(--accent); }
  .msg-label .dot.tool { background: var(--warn); }
  .msg-label .dot.error { background: var(--danger); }
  .msg-body { white-space: pre-wrap; }
  .msg-body code {
    background: #0b1018;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.92em;
  }

  .typing {
    display: inline-flex;
    gap: 5px;
    padding: 2px 0;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 80%, 100% { opacity: .35; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-3px); }
  }

  /* Composer */
  #composer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 14px 14px;
    flex-shrink: 0;
  }
  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #promptInput {
    flex: 1;
    min-height: 44px;
    max-height: 140px;
    resize: none;
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font: inherit;
    font-size: 13.5px;
    line-height: 1.4;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  #promptInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  #promptInput::placeholder { color: var(--text-muted); }
  #sendBtn {
    height: 44px;
    min-width: 72px;
    padding: 0 16px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #041018;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  #sendBtn:hover:not(:disabled) { background: var(--accent-hover); }
  #sendBtn:disabled { opacity: .45; cursor: not-allowed; }
  #hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
  <header id="header">
    <div id="brand">
      <div id="brand-mark">L</div>
      <div id="brand-text">
        <div id="brand-title">LuckyD Code</div>
        <div id="brand-sub">AI coding agent</div>
      </div>
    </div>
    <div id="header-actions">
      <button class="icon-btn" id="clearBtn" title="Clear chat">Clear</button>
    </div>
  </header>

  <main id="chat" aria-live="polite">
    <div class="empty-state" id="emptyState">
      <h2>What should we build?</h2>
      <p>Ask for code changes, debugging help, refactors, or explanations. I can read files and run tools in your workspace.</p>
      <div class="suggestions">
        <button class="chip" data-prompt="Explain this project structure">Explain project</button>
        <button class="chip" data-prompt="Find bugs or rough edges in the codebase">Find issues</button>
        <button class="chip" data-prompt="Add tests for the main modules">Add tests</button>
      </div>
    </div>
  </main>

  <footer id="composer">
    <div id="input-row">
      <textarea id="promptInput" rows="1" placeholder="Message LuckyD…" autofocus></textarea>
      <button id="sendBtn">Send</button>
    </div>
    <div id="hint">Enter to send · Shift+Enter for newline</div>
  </footer>

<script>
(function () {
  'use strict';

  var chat = document.getElementById('chat');
  var input = document.getElementById('promptInput');
  var sendBtn = document.getElementById('sendBtn');
  var clearBtn = document.getElementById('clearBtn');
  var emptyState = document.getElementById('emptyState');
  var waiting = false;
  var vscode = acquireVsCodeApi();

  function hideEmpty() {
    if (emptyState && emptyState.parentNode) emptyState.remove();
    emptyState = null;
  }

  function scrollBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function labelFor(sender) {
    if (sender === 'user') return '<span class="dot user"></span> You';
    if (sender === 'agent') return '<span class="dot agent"></span> LuckyD';
    if (sender === 'tool-result') return '<span class="dot tool"></span> Tool';
    if (sender === 'error') return '<span class="dot error"></span> Error';
    return '';
  }

  function addMessage(sender, text) {
    hideEmpty();
    var div = document.createElement('div');
    div.className = 'message ' + sender;

    var labelHtml = labelFor(sender);
    if (labelHtml) {
      var label = document.createElement('div');
      label.className = 'msg-label';
      label.innerHTML = labelHtml;
      div.appendChild(label);
    }

    var body = document.createElement('div');
    body.className = 'msg-body';
    body.textContent = text || '';
    div.appendChild(body);

    chat.appendChild(div);
    scrollBottom();
    return div;
  }

  function addToolResult(text) {
    addMessage('tool-result', text);
  }

  function showTyping() {
    hideEmpty();
    var div = document.createElement('div');
    div.className = 'message agent';
    div.id = 'typing-indicator';
    div.innerHTML =
      '<div class="msg-label"><span class="dot agent"></span> LuckyD</div>' +
      '<div class="typing"><span></span><span></span><span></span></div>';
    chat.appendChild(div);
    scrollBottom();
  }

  function hideTyping() {
    var el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function setBusy(on) {
    waiting = !!on;
    sendBtn.disabled = waiting;
    input.disabled = waiting;
  }

  function autosize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  }

  function send(prompt) {
    if (waiting) return;
    prompt = (prompt || '').trim();
    if (!prompt) return;

    setBusy(true);
    addMessage('user', prompt);
    input.value = '';
    autosize();
    showTyping();
    vscode.postMessage({ type: 'sendPrompt', text: prompt });
  }

  function handleMessage(event) {
    var msg = event.data || {};
    switch (msg.type) {
      case 'addChunk':
        hideTyping();
        var last = chat.lastElementChild;
        if (last && last.classList.contains('agent') && last.id !== 'typing-indicator') {
          var body = last.querySelector('.msg-body');
          if (body) body.textContent += msg.text || '';
        } else {
          addMessage('agent', msg.text || '');
        }
        scrollBottom();
        break;

      case 'addMessage':
        hideTyping();
        addMessage(msg.sender || 'agent', msg.text || '');
        setBusy(false);
        input.focus();
        break;

      case 'addToolResult':
        hideTyping();
        addToolResult(msg.text || '');
        break;

      case 'setWaiting':
        if (msg.value) {
          setBusy(true);
          if (!document.getElementById('typing-indicator')) showTyping();
        } else {
          hideTyping();
          setBusy(false);
        }
        break;

      case 'clear':
        chat.innerHTML =
          '<div class="empty-state" id="emptyState">' +
          '<h2>What should we build?</h2>' +
          '<p>Ask for code changes, debugging help, refactors, or explanations.</p>' +
          '</div>';
        emptyState = document.getElementById('emptyState');
        setBusy(false);
        break;

      case 'error':
        hideTyping();
        addMessage('error', msg.text || 'Something went wrong.');
        setBusy(false);
        input.focus();
        break;

      case 'focus':
        input.focus();
        break;

      case 'status':
        if (msg.text) {
          var sub = document.getElementById('brand-sub');
          if (sub) sub.textContent = msg.text;
        }
        break;
    }
  }

  window.addEventListener('message', handleMessage);
  sendBtn.addEventListener('click', function () { send(input.value); });
  clearBtn.addEventListener('click', function () {
    vscode.postMessage({ type: 'clear' });
  });
  input.addEventListener('input', autosize);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send(input.value);
    }
  });

  document.querySelectorAll('.chip').forEach(function (btn) {
    btn.addEventListener('click', function () {
      send(btn.getAttribute('data-prompt') || btn.textContent);
    });
  });

  autosize();
  input.focus();
})();
</script>
</body>
</html>
