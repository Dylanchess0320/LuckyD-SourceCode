# ── MkDocs Configuration ───────────────────────────────────────────────
# Build: mkdocs build
# Serve: mkdocs serve

site_name: LuckyD Code
site_description: AI-powered coding agent with multi-LLM support, memory graph, and VS Code integration
site_author: LuckyD
site_url: https://luckyd.github.io/coding-agent/
repo_name: luckyd/coding-agent
repo_url: https://github.com/luckyd/coding-agent
edit_uri: edit/main/docs/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    logo: material/robot

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/luckyd/coding-agent
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/luckyd-code/
  generator: false

copyright: Copyright &copy; 2026 LuckyD

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
  - mkdocstrings:
      default:
        handlers:
          python:
            paths: [".."]
            options:
              show_source: true
              show_root_heading: true
              show_category_heading: true
              docstring_style: google
  - git-revision-date-localized:
      enabled: !ENV [CI, false]
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Guide:
      - Getting Started: guide/getting-started.md
      - Installation: guide/installation.md
      - Configuration: guide/configuration.md
      - Usage: guide/usage.md
      - Tools: guide/tools.md
      - Memory System: guide/memory.md
      - Providers: guide/providers.md
      - Docker: guide/docker.md
  - Reference:
      - API: reference/api.md
      - CLI: reference/cli.md
      - Configuration: reference/configuration.md
  - Development:
      - Contributing: ../CONTRIBUTING.md
      - Changelog: ../CHANGELOG.md
      - Security: ../SECURITY.md
      - Code of Conduct: ../CODE_OF_CONDUCT.md
